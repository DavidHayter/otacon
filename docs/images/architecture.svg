<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#abg)" rx="8"/>
  <style>
    text { font-family: -apple-system, sans-serif; }
    .title { font-size: 16px; fill: #58a6ff; font-weight: bold; }
    .label { font-size: 11px; fill: #c9d1d9; }
    .sublabel { font-size: 9px; fill: #8b949e; }
    .box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 6; }
    .box-accent { fill: #161b22; stroke: #58a6ff; stroke-width: 1.5; rx: 6; }
    .box-green { fill: #161b22; stroke: #3fb950; stroke-width: 1.5; rx: 6; }
    .box-red { fill: #161b22; stroke: #f85149; stroke-width: 1.5; rx: 6; }
    .box-purple { fill: #161b22; stroke: #bc8cff; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #30363d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-accent { stroke: #58a6ff; stroke-width: 1.5; fill: none; marker-end: url(#arrowblue); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arrowblue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">OTACON ARCHITECTURE</text>

  <!-- CLI / Entry -->
  <rect x="50" y="50" width="160" height="50" class="box-accent"/>
  <text x="130" y="72" text-anchor="middle" class="label">CLI Commands</text>
  <text x="130" y="88" text-anchor="middle" class="sublabel">scan audit diagnose events</text>

  <rect x="240" y="50" width="160" height="50" class="box-accent"/>
  <text x="320" y="72" text-anchor="middle" class="label">Guardian Mode</text>
  <text x="320" y="88" text-anchor="middle" class="sublabel">Long-running daemon</text>

  <!-- K8s API -->
  <rect x="500" y="50" width="140" height="50" class="box"/>
  <text x="570" y="72" text-anchor="middle" class="label">Kubernetes API</text>
  <text x="570" y="88" text-anchor="middle" class="sublabel">client-go / watch API</text>

  <!-- Arrows from CLI/Guardian to K8s -->
  <path d="M210 75 L240 75" class="arrow"/>
  <path d="M400 75 L500 75" class="arrow-accent"/>

  <!-- Core Engines Row -->
  <rect x="50" y="140" width="130" height="60" class="box-green"/>
  <text x="115" y="162" text-anchor="middle" class="label">Audit Scanner</text>
  <text x="115" y="178" text-anchor="middle" class="sublabel">50+ rules, 5 categories</text>

  <rect x="200" y="140" width="130" height="60" class="box-green"/>
  <text x="265" y="162" text-anchor="middle" class="label">Diagnostics</text>
  <text x="265" y="178" text-anchor="middle" class="sublabel">Network Logs Nodes</text>

  <rect x="350" y="140" width="130" height="60" class="box-accent"/>
  <text x="415" y="162" text-anchor="middle" class="label">Event Watcher</text>
  <text x="415" y="178" text-anchor="middle" class="sublabel">Real-time stream</text>

  <!-- Arrow from K8s to Watcher -->
  <path d="M570 100 L570 120 L415 120 L415 140" class="arrow-accent"/>

  <!-- Intelligence Engine -->
  <rect x="80" y="250" width="520" height="110" class="box-purple" rx="8"/>
  <text x="340" y="272" text-anchor="middle" class="label" fill="#bc8cff">Intelligence Engine</text>

  <rect x="100" y="285" width="110" height="40" class="box"/>
  <text x="155" y="302" text-anchor="middle" class="label">Correlator</text>
  <text x="155" y="316" text-anchor="middle" class="sublabel">7 patterns</text>

  <rect x="225" y="285" width="110" height="40" class="box"/>
  <text x="280" y="302" text-anchor="middle" class="label">Deduplicator</text>
  <text x="280" y="316" text-anchor="middle" class="sublabel">Smart grouping</text>

  <rect x="350" y="285" width="110" height="40" class="box"/>
  <text x="405" y="302" text-anchor="middle" class="label">Cooldown</text>
  <text x="405" y="316" text-anchor="middle" class="sublabel">Alert fatigue guard</text>

  <rect x="475" y="285" width="110" height="40" class="box"/>
  <text x="530" y="302" text-anchor="middle" class="label">Digest Builder</text>
  <text x="530" y="316" text-anchor="middle" class="sublabel">Daily/Weekly</text>

  <!-- Arrow from Watcher to Intelligence -->
  <path d="M415 200 L415 250" class="arrow-accent"/>

  <!-- Notification Router -->
  <rect x="80" y="400" width="520" height="90" class="box-red" rx="8"/>
  <text x="340" y="420" text-anchor="middle" class="label" fill="#f85149">Notification Router</text>

  <rect x="100" y="435" width="85" height="35" class="box"/>
  <text x="142" y="457" text-anchor="middle" class="sublabel">Slack</text>

  <rect x="200" y="435" width="85" height="35" class="box"/>
  <text x="242" y="457" text-anchor="middle" class="sublabel">Teams</text>

  <rect x="300" y="435" width="85" height="35" class="box"/>
  <text x="342" y="457" text-anchor="middle" class="sublabel">Email</text>

  <rect x="400" y="435" width="85" height="35" class="box"/>
  <text x="442" y="457" text-anchor="middle" class="sublabel">Webhook</text>

  <rect x="500" y="435" width="85" height="35" class="box"/>
  <text x="542" y="457" text-anchor="middle" class="sublabel">Enrichers</text>

  <!-- Arrow from Intelligence to Notifications -->
  <path d="M340 360 L340 400" class="arrow"/>

  <!-- Storage & API -->
  <rect x="660" y="140" width="200" height="60" class="box"/>
  <text x="760" y="162" text-anchor="middle" class="label">SQLite Storage</text>
  <text x="760" y="178" text-anchor="middle" class="sublabel">WAL mode, 7-day retention</text>

  <rect x="660" y="240" width="200" height="60" class="box-accent"/>
  <text x="760" y="262" text-anchor="middle" class="label">HTTP API Server</text>
  <text x="760" y="278" text-anchor="middle" class="sublabel">REST + Alertmanager bridge</text>

  <rect x="660" y="340" width="200" height="60" class="box-accent"/>
  <text x="760" y="362" text-anchor="middle" class="label">Web UI (React)</text>
  <text x="760" y="378" text-anchor="middle" class="sublabel">Embedded in binary</text>

  <!-- Connections -->
  <path d="M600 305 L660 170" class="arrow"/>
  <path d="M760 200 L760 240" class="arrow"/>
  <path d="M760 300 L760 340" class="arrow"/>

  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" class="sublabel">Single binary • No external dependencies • GitOps-native CRDs</text>
  <text x="450" y="565" text-anchor="middle" class="sublabel" fill="#58a6ff">github.com/merthan/otacon</text>
</svg>
