run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports
    - gosec
    - unconvert
    - goconst
    - prealloc
    - bodyclose
    - nilerr
    - whitespace
  disable:
    - depguard

linters-settings:
  govet:
    check-shadowing: false
  gosec:
    excludes:
      - G104 # Unhandled errors (too noisy for v1)
  goconst:
    min-len: 3
    min-occurrences: 4

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: internal/api/server_html.go
      linters:
        - goconst
  max-issues-per-linter: 50
  max-same-issues: 5
